<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel Dashboard</title>

<style>
body{
  background:#0b1020;
  color:#e5e7eb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  margin:0;
}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:24px;
}
h1{
  margin:0 0 20px 0;
  font-size:28px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:20px;
}
.panel{
  background:#121a2b;
  border:1px solid #24324d;
  border-radius:16px;
  padding:20px;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sentinel Dashboard</h1>
  <div class="grid">
    {{ telemetry_panel|safe }}
    {{ needs_human_panel|safe }}
    {{ approved_panel|safe }}
    {{ rejected_panel|safe }}
    {{ executed_panel|safe }}
    {{ timeline_panel|safe }}
    {{ agents_panel|safe }}
  </div>
</div>
</body>
</html>
